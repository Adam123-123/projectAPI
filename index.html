<!DOCTYPE html>
<html lang="nl">
<head>
    <meta charset="UTF-8">
    <title>Pokémon API Zoekmachine</title>
    <link rel="stylesheet" href="style.css">
    <script src="script.js"></script>
    <style>
        body {
            font-family: Arial, sans-serif;
            background: linear-gradient(135deg, #ff0000, #ffffff);
            text-align: center;
            padding: 40px;
        }

        .container {
            background: white;
            padding: 30px;
            border-radius: 15px;
            max-width: 400px;
            margin: auto;
            box-shadow: 0 10px 25px rgba(0,0,0,0.2);
        }

        input {
            padding: 10px;
            width: 70%;
            border-radius: 8px;
            border: 1px solid #ccc;
        }

        button {
            padding: 10px 15px;
            border: none;
            border-radius: 8px;
            background: #ff0000;
            color: white;
            cursor: pointer;
            font-weight: bold;
        }

        button:hover {
            background: #cc0000;
        }

        img {
            width: 150px;
        }

        .pokemon-info {
            margin-top: 20px;
        }
    </style>
</head>
<body>

    <div class="container">
        <h1>Pokémon Zoeker 🔍</h1>
        <input type="text" id="pokemonName" placeholder="Bijv. pikachu">
        <button onclick="getPokemon()">Zoek</button>

        <div class="pokemon-info" id="pokemonInfo"></div>
    </div>

</body>
</html>
